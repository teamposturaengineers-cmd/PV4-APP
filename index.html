<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POSTURA Dashboard</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #1e293b, #020617);
  color: white;
  text-align: center;
  margin: 0;
}

h1 {
  margin-top: 15px;
  font-size: 30px;
  letter-spacing: 1px;
}

button {
  padding: 12px 24px;
  font-size: 15px;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  border: none;
  border-radius: 12px;
  cursor: pointer;
  margin: 10px;
  box-shadow: 0 4px 15px rgba(34,197,94,0.4);
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

.container {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.status-card {
  background: rgba(255,255,255,0.05);
  padding: 25px;
  border-radius: 20px;
  margin: 15px;
  width: 300px;
  backdrop-filter: blur(15px);
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

.big-status {
  font-size: 32px;
  font-weight: bold;
  transition: 0.3s;
}

.good {
  color: #22c55e;
  text-shadow: 0 0 15px #22c55e;
}

.bad {
  color: #ef4444;
  text-shadow: 0 0 15px #ef4444;
}

.alert {
  margin-top: 10px;
  color: #facc15;
  font-size: 16px;
}

.dashboard {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 900px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  margin: 12px;
  width: 260px;
  border-radius: 18px;
  backdrop-filter: blur(12px);
  box-shadow: 0 8px 25px rgba(0,0,0,0.25);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.progress-bar {
  width: 100%;
  height: 10px;
  background: #374151;
  border-radius: 10px;
  overflow: hidden;
  margin-top: 8px;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #22c55e, #ef4444);
  transition: 0.3s;
}

input[type=range] {
  width: 85%;
}
</style>

</head>

<body>

<h1 id="title">POSTURA Dashboard 🚀</h1>

<button onclick="connectBLE()">Connect Device</button>

<div class="container">

<div class="status-card">
  <div id="status" class="big-status">--</div>
  <div id="alert" class="alert"></div>
</div>

<div class="dashboard">

<div class="card">
  <h3>Angle</h3>
  <p id="angle">--</p>
</div>

<div class="card">
  <h3>Deviation</h3>
  <p id="deviation">--</p>
  <div class="progress-bar">
    <div id="progress" class="progress-fill"></div>
  </div>
</div>

<div class="card">
  <h3>Session Time ⏱</h3>
  <p id="timer">00:00</p>
</div>

<div class="card">
  <h3>Slouch Count 🔢</h3>
  <p id="slouch">0</p>
</div>

<div class="card">
  <h3>Threshold 🎚</h3>
  <input type="range" min="5" max="30" value="10" oninput="updateThreshold(this.value)">
  <p id="thValue">10°</p>
</div>

</div>

</div>

<script>
let characteristic;
let currentThreshold = 10;
let slouchCount = 0;
let lastState = "good";

let startTime;
let timerInterval;

// BLE CONNECT (HYBRID)
async function connectBLE() {
  try {
    const device = await navigator.bluetooth.requestDevice({
      filters: [{ name: "POSTURA_V3" }],
      optionalServices: ["12345678-1234-1234-1234-1234567890ab"]
    });

    const server = await device.gatt.connect();
    const services = await server.getPrimaryServices();

    let targetChar = null;

    for (let service of services) {
      const chars = await service.getCharacteristics();
      for (let char of chars) {
        if (char.properties.notify) {
          targetChar = char;
          break;
        }
      }
      if (targetChar) break;
    }

    if (!targetChar) throw "No characteristic found";

    characteristic = targetChar;

    await characteristic.startNotifications();
    characteristic.addEventListener("characteristicvaluechanged", handleData);

    startTimer();

    document.getElementById("title").innerText = "Connected to POSTURA_V3 ✅";

  } catch (error) {
    console.error(error);
    alert("Connection Failed ❌");
  }
}

// HANDLE DATA
function handleData(event) {
  const value = new TextDecoder().decode(event.target.value);
  const [angle, deviation] = value.split(",").map(Number);

  document.getElementById("angle").innerText = angle.toFixed(2);
  document.getElementById("deviation").innerText = deviation.toFixed(2);

  let percent = Math.min((deviation / currentThreshold) * 100, 100);
  document.getElementById("progress").style.width = percent + "%";

  const statusEl = document.getElementById("status");
  const alertEl = document.getElementById("alert");

  if (deviation > currentThreshold) {
    statusEl.innerText = "BAD POSTURE ❌";
    statusEl.className = "big-status bad";
    alertEl.innerText = "⚠️ Fix your posture!";

    if (lastState === "good") {
      slouchCount++;
      document.getElementById("slouch").innerText = slouchCount;
    }

    lastState = "bad";
  } else {
    statusEl.innerText = "GOOD POSTURE ✅";
    statusEl.className = "big-status good";
    alertEl.innerText = "";
    lastState = "good";
  }
}

// TIMER
function startTimer() {
  startTime = Date.now();

  if (timerInterval) clearInterval(timerInterval);

  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const min = String(Math.floor(elapsed / 60)).padStart(2, '0');
    const sec = String(elapsed % 60).padStart(2, '0');
    document.getElementById("timer").innerText = `${min}:${sec}`;
  }, 1000);
}

// THRESHOLD
function updateThreshold(value) {
  currentThreshold = parseInt(value);
  document.getElementById("thValue").innerText = value + "°";

  if (characteristic) {
    const msg = "THRESHOLD:" + value;
    characteristic.writeValue(new TextEncoder().encode(msg));
  }
}
</script>

</body>
</html>
