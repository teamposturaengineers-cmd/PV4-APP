<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POSTURA V3</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  text-align: center;
}

button {
  padding: 12px 25px;
  font-size: 16px;
  background: #22c55e;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  margin: 15px;
}

.card {
  background: #1e293b;
  padding: 15px;
  margin: 10px auto;
  width: 300px;
  border-radius: 12px;
}

.status-good { color: #22c55e; font-weight: bold; }
.status-bad { color: #ef4444; font-weight: bold; }

input[type=range] {
  width: 80%;
}
</style>

</head>

<body>

<h1>POSTURA V3</h1>

<button onclick="connectBLE()">Connect Device</button>

<div class="card">
  <h3>Angle</h3>
  <p id="angle">--</p>
</div>

<div class="card">
  <h3>Deviation</h3>
  <p id="deviation">--</p>
</div>

<div class="card">
  <h3>Status</h3>
  <p id="status">--</p>
</div>

<div class="card">
  <h3>Session Time ⏱</h3>
  <p id="timer">00:00</p>
</div>

<div class="card">
  <h3>Slouch Count 🔢</h3>
  <p id="slouch">0</p>
</div>

<div class="card">
  <h3>Threshold 🎚</h3>
  <input type="range" min="5" max="30" value="10" oninput="updateThreshold(this.value)">
  <p id="thValue">10°</p>
</div>

<script>
let characteristic;
let currentThreshold = 10;
let slouchCount = 0;
let lastState = "good";

let startTime;
let timerInterval;

// 🚀 FINAL CONNECT FUNCTION (NO UUID DEPENDENCY)
async function connectBLE() {
  try {
    const device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true
    });

    console.log("Device:", device.name);

    const server = await device.gatt.connect();
    console.log("GATT Connected");

    const services = await server.getPrimaryServices();

    let targetChar = null;

    for (let service of services) {
      const chars = await service.getCharacteristics();

      for (let char of chars) {
        if (char.properties.notify) {
          targetChar = char;
          break;
        }
      }

      if (targetChar) break;
    }

    if (!targetChar) {
      throw new Error("No valid characteristic found");
    }

    characteristic = targetChar;

    await characteristic.startNotifications();

    characteristic.addEventListener("characteristicvaluechanged", handleData);

    startTimer();

    alert("Connected Successfully 🚀");

  } catch (error) {
    console.error("ERROR:", error);
    alert("Connection Failed ❌");
  }
}

// 📊 HANDLE DATA
function handleData(event) {
  const value = new TextDecoder().decode(event.target.value);
  const parts = value.split(",");

  if (parts.length < 2) return;

  const angle = parseFloat(parts[0]);
  const deviation = parseFloat(parts[1]);

  document.getElementById("angle").innerText = angle.toFixed(2);
  document.getElementById("deviation").innerText = deviation.toFixed(2);

  const statusEl = document.getElementById("status");

  if (deviation > currentThreshold) {
    statusEl.innerText = "Bad Posture ❌";
    statusEl.className = "status-bad";

    if (lastState === "good") {
      slouchCount++;
      document.getElementById("slouch").innerText = slouchCount;
    }

    lastState = "bad";
  } else {
    statusEl.innerText = "Good Posture ✅";
    statusEl.className = "status-good";
    lastState = "good";
  }
}

// ⏱ TIMER
function startTimer() {
  startTime = Date.now();

  if (timerInterval) clearInterval(timerInterval);

  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const min = String(Math.floor(elapsed / 60)).padStart(2, '0');
    const sec = String(elapsed % 60).padStart(2, '0');
    document.getElementById("timer").innerText = `${min}:${sec}`;
  }, 1000);
}

// 🎚 THRESHOLD CONTROL
function updateThreshold(value) {
  currentThreshold = parseInt(value);
  document.getElementById("thValue").innerText = value + "°";

  if (characteristic) {
    const msg = "THRESHOLD:" + value;
    characteristic.writeValue(new TextEncoder().encode(msg));
  }
}
</script>

</body>
</html>
